<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotaFácil - Gestión Integral</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .toolbar { display: flex; gap: 10px; margin-bottom: 20px; background: #e2e8f0; padding: 15px; border-radius: 8px; flex-wrap: wrap; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ccc; padding: 12px; text-align: center; }
        button, .nav-btn { padding: 10px 15px; cursor: pointer; border: none; border-radius: 4px; color: white; text-decoration: none; font-size: 14px; font-weight: bold; display: inline-flex; align-items: center; gap: 8px; }
        .btn-add { background: #555; }
        .btn-sync { background: #3182ce; }
        .btn-excel { background: #2f855a; }
        .btn-plan { background: #805ad5; }
        input { width: 80px; padding: 5px; text-align: center; border: 1px solid #ddd; }
    </style>
</head>
<body>
    <div class="container">
        <h1>NotaFácil - Libreta de Notas</h1>
        <div class="toolbar">
            <button class="btn-add" onclick="agregarAlumno()"><i class="fa-solid fa-plus"></i> Agregar Estudiante</button>
            <button class="btn-sync" onclick="guardarEnNube()"><i class="fa-solid fa-cloud-arrow-up"></i> Sincronizar Nube</button>
            <button class="btn-excel" onclick="exportarExcel()"><i class="fa-solid fa-file-excel"></i> Excel</button>
            <a href="planificador.html" class="nav-btn btn-plan"><i class="fa-solid fa-calendar-days"></i> Ir a Planificador</a>
        </div>
        <table>
            <thead><tr><th>Nombre</th><th>Nota</th></tr></thead>
            <tbody id="tabla-body"></tbody>
        </table>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getFirestore, doc, setDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
        import { getAuth, signInAnonymously } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'notafacil-cloud';

        // Lógica de exportar Excel
        window.exportarExcel = () => {
            let csv = "Nombre,Nota\n";
            window.alumnos.forEach(a => { csv += `${a.nombre},${a.nota}\n`; });
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = window.URL.createObjectURL(blob);
            a.download = "Reporte_Notas.csv";
            a.click();
        };

        // Lógica de Nube
        window.guardarEnNube = async () => {
            const user = auth.currentUser || await signInAnonymously(auth).then(res => res.user);
            await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'data', 'datos_app'), { alumnos: window.alumnos });
            alert("✅ ¡Datos guardados en la nube!");
        };
    </script>

    <script>
        // Cargar datos originales
        window.alumnos = JSON.parse(localStorage.getItem('alumnos')) || [{nombre: "Ejemplo", nota: 5.0}];

        function renderizarTabla() {
            const tbody = document.getElementById('tabla-body');
            tbody.innerHTML = '';
            window.alumnos.forEach((a, i) => {
                tbody.innerHTML += `<tr>
                    <td><input type="text" value="${a.nombre}" onchange="alumnos[${i}].nombre=this.value; guardar()"></td>
                    <td><input type="number" value="${a.nota}" onchange="alumnos[${i}].nota=this.value; guardar()"></td>
                </tr>`;
            });
        }

        function agregarAlumno() {
            window.alumnos.push({nombre: "Nuevo", nota: 4.0});
            guardar();
        }

        function guardar() {
            localStorage.setItem('alumnos', JSON.stringify(window.alumnos));
            renderizarTabla();
        }

        renderizarTabla();
    </script>
</body>
</html>
