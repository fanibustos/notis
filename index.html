<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotaFácil - Registro Escolar Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #2b6cb0;
            --success: #2f855a;
            --danger: #e53e3e;
            --background: #f7fafc;
            --dark: #2d3748;
            --border: #e2e8f0;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background);
            padding: 30px 20px;
            color: var(--dark);
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            padding: 35px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        /* Encabezado Principal */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--border);
            padding-bottom: 20px;
            margin-bottom: 25px;
        }

        h1 { 
            color: var(--primary); 
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Bloque de Información Institucional (Arriba) */
        .info-institucional {
            background-color: #f8fafc;
            border: 1px solid var(--border);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .input-block {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .input-block label {
            font-size: 13px;
            font-weight: 700;
            color: #4a5568;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-block input {
            padding: 10px 12px;
            font-size: 15px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            outline: none;
            background: white;
        }

        .input-block input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(66, 153, 225, 0.15);
        }

        /* Panel de Asignaturas */
        .subject-panel {
            background-color: #ebf8ff;
            border: 1px solid #bee3f8;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: flex-end;
            gap: 20px;
        }

        .select-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .select-asignatura {
            font-size: 16px;
            padding: 10px 15px;
            border: 1px solid #90cdf4;
            border-radius: 6px;
            background-color: white;
            font-weight: 600;
            min-width: 200px;
            cursor: pointer;
        }

        /* Caja para añadir Alumnos */
        .alumno-panel {
            background-color: #f7fafc;
            border: 1px solid var(--border);
            padding: 15px 20px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .form-group {
            display: flex;
            gap: 10px;
        }

        .form-group input {
            flex: 1;
            padding: 12px;
            font-size: 15px;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            outline: none;
        }

        /* Botones del Sistema */
        button {
            padding: 10px 18px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-primary { background-color: var(--primary); color: white; }
        .btn-primary:hover { background-color: #1e4e8c; }
        
        .btn-success { background-color: var(--success); color: white; }
        .btn-success:hover { background-color: #22543d; }
        
        .btn-danger { background-color: var(--danger); color: white; }
        .btn-danger:hover { background-color: #c53030; }

        .btn-icon-only { padding: 11px; border-radius: 6px; }

        /* Estructura de Tabla */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            background: white;
        }

        th, td {
            border: 1px solid var(--border);
            padding: 12px 10px;
            text-align: center;
        }

        th { 
            background-color: #edf2f7; 
            color: #4a5568; 
            font-weight: 700;
            font-size: 14px;
        }

        .student-name { 
            text-align: left; 
            font-weight: 600; 
            width: 30%; 
            font-size: 15px;
        }
        
        .input-nota {
            width: 52px;
            text-align: center;
            padding: 8px 2px;
            font-size: 15px;
            font-weight: bold;
            border: 1px solid #cbd5e0;
            border-radius: 5px;
        }

        .promedio { font-weight: bold; font-size: 16px; }
        .aprobado { color: var(--success); background-color: #f0fff4; }
        .reprobado { color: var(--danger); background-color: #fff5f5; }

        .ayuda-text {
            font-size: 14px;
            color: #718096;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Configuración de Impresión Limpia */
        @media print {
            body { background: white; padding: 0; }
            .container { box-shadow: none; padding: 0; max-width: 100%; }
            header button, .subject-panel, .alumno-panel, th:last-child, td:last-child {
                display: none !important;
            }
            .info-institucional {
                grid-template-columns: repeat(3, 1fr);
                background: transparent;
                border: none;
                padding: 0 0 15px 0;
                border-bottom: 2px dashed var(--dark);
                border-radius: 0;
            }
            .input-block input { border: none !important; padding: 0; font-weight: bold; font-size: 16px; }
            th, td { padding: 8px; font-size: 13px; }
            input { border: none !important; background: transparent !important; }
        }
    </style>
</head>
<body>

<div class="container">
    
    <!-- Encabezado principal -->
    <header>
        <h1><i class="fa-solid fa-graduation-cap"></i> NotaFácil</h1>
        <button onclick="window.print()" class="btn-success">
            <i class="fa-solid fa-print"></i> Imprimir Planilla
        </button>
    </header>

    <!-- RECUADRO SUPERIOR: Colegio, Curso y Profesor Jefe -->
    <div class="info-institucional">
        <div class="input-block">
            <label><i class="fa-solid fa-school"></i> Establecimiento / Colegio</label>
            <input type="text" id="txtColegio" placeholder="Ej: Escuela Particular Quilicura, Lautaro" onchange="guardarDatosInstitucionales()">
        </div>
        <div class="input-block">
            <label><i class="fa-solid fa-users"></i> Curso</label>
            <input type="text" id="txtCurso" placeholder="Ej: 5° Año Básico" onchange="guardarDatosInstitucionales()">
        </div>
        <div class="input-block">
            <label><i class="fa-solid fa-user-tie"></i> Profesor(a) Jefe</label>
            <input type="text" id="txtProfesor" placeholder="Ej: Prof. Stefani Bustos" onchange="guardarDatosInstitucionales()">
        </div>
    </div>

    <!-- SECTOR DE ASIGNATURAS: Seleccionar, Crear y Eliminar -->
    <div class="subject-panel">
        <div class="input-block">
            <label><i class="fa-solid fa-book"></i> Asignatura Actual</label>
            <div class="select-group">
                <select id="selectAsignatura" class="select-asignatura" onchange="cambiarAsignatura(this.value)">
                    <!-- Dinámico -->
                </select>
                <!-- Botón para borrar la materia seleccionada -->
                <button onclick="eliminarAsignaturaActiva()" class="btn-danger btn-icon-only" title="Eliminar esta asignatura por completo">
                    <i class="fa-solid fa-trash-can"></i>
                </button>
            </div>
        </div>

        <div class="input-block" style="margin-left: auto;">
            <label>Crear Nueva Asignatura</label>
            <div class="select-group">
                <input type="text" id="nuevaAsignaturaNombre" style="padding: 9px 12px; font-size: 14px; width: 200px;" placeholder="Ej: Educación Física">
                <button onclick="crearNuevaAsignatura()" class="btn-primary" style="padding: 10px 14px;">+ Crear</button>
            </div>
        </div>
    </div>

    <!-- SECTOR PARA AGREGAR ALUMNOS -->
    <div class="alumno-panel">
        <p class="ayuda-text"><i class="fa-solid fa-circle-info"></i> Ingrese el nombre del estudiante y presione el botón azul para listarlo en la tabla:</p>
        <div class="form-group">
            <input type="text" id="nombreAlumno" placeholder="Escriba el nombre completo del estudiante aquí...">
            <button onclick="agregarAlumno()" class="btn-primary"><i class="fa-solid fa-user-plus"></i> Agregar Alumno</button>
        </div>
    </div>

    <!-- TABLA DE CALIFICACIONES -->
    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th style="text-align: left;">Estudiante</th>
                    <th>Nota 1</th>
                    <th>Nota 2</th>
                    <th>Nota 3</th>
                    <th>Nota 4</th>
                    <th>Nota 5</th>
                    <th>Nota 6</th>
                    <th>Promedio</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody id="tablaCuerpo">
                <!-- Dinámico -->
            </tbody>
        </table>
    </div>
</div>

<script>
    // Cargar datos de identificación
    let datosInst = JSON.parse(localStorage.getItem('datosInst')) || { colegio: "", curso: "", profesor: "" };

    // Estructuras principales
    let asignaturas = JSON.parse(localStorage.getItem('asignaturas')) || ['Ciencias', 'Lenguaje', 'Matemática'];
    let asignaturaActiva = localStorage.getItem('asignaturaActiva') || asignaturas[0];
    let alumnos = JSON.parse(localStorage.getItem('alumnos')) || [];

    function guardarTodo() {
        localStorage.setItem('alumnos', JSON.stringify(alumnos));
        localStorage.setItem('asignaturas', JSON.stringify(asignaturas));
        localStorage.setItem('asignaturaActiva', asignaturaActiva);
        localStorage.setItem('datosInst', JSON.stringify(datosInst));
    }

    function inicializarApp() {
        // Colocar los textos guardados en los campos superiores
        document.getElementById('txtColegio').value = datosInst.colegio;
        document.getElementById('txtCurso').value = datosInst.curso;
        document.getElementById('txtProfesor').value = datosInst.profesor;

        // Rellenar selector de asignaturas
        const select = document.getElementById('selectAsignatura');
        select.innerHTML = '';
        
        if (asignaturas.length === 0) {
            const option = document.createElement('option');
            option.textContent = "-- Sin Materias --";
            select.appendChild(option);
        } else {
            asignaturas.forEach(asig => {
                const option = document.createElement('option');
                option.value = asig;
                option.textContent = asig;
                if (asig === asignaturaActiva) option.selected = true;
                select.appendChild(option);
            });
        }

        renderizarTabla();
    }

    function guardarDatosInstitucionales() {
        datosInst.colegio = document.getElementById('txtColegio').value;
        datosInst.curso = document.getElementById('txtCurso').value;
        datosInst.profesor = document.getElementById('txtProfesor').value;
        guardarTodo();
    }

    function cambiarAsignatura(nuevaAsig) {
        if(asignaturas.length === 0) return;
        asignaturaActiva = nuevaAsig;
        guardarTodo();
        renderizarTabla();
    }

    function crearNuevaAsignatura() {
        const input = document.getElementById('nuevaAsignaturaNombre');
        const nueva = input.value.trim();
        if (!nueva) return;

        if (asignaturas.includes(nueva)) {
            alert('Esta asignatura ya existe en el listado.');
            return;
        }

        asignaturas.push(nueva);
        asignaturaActiva = nueva;
        
        alumnos.forEach(alumno => {
            if(!alumno.notas) alumno.notas = {};
            alumno.notas[nueva] = [0, 0, 0, 0, 0, 0];
        });

        input.value = '';
        guardarTodo();
        inicializarApp();
    }

    function eliminarAsignaturaActiva() {
        if (asignaturas.length === 0) return;

        if (confirm(`¿Está seguro que desea eliminar la asignatura "${asignaturaActiva}"? Esto borrará todas las notas guardadas en esta materia para todos los alumnos.`)) {
            
            // Eliminar los registros internos de notas correspondientes a esa asignatura
            alumnos.forEach(alumno => {
                if(alumno.notas && alumno.notas[asignaturaActiva]) {
                    delete alumno.notas[asignaturaActiva];
                }
            });

            // Quitar de la lista de asignaturas
            asignaturas = asignaturas.filter(asig => asig !== asignaturaActiva);
            
            // Cambiar la asignatura activa a la primera que quede, si hay
            asignaturaActiva = asignaturas.length > 0 ? asignaturas[0] : "";
            
            guardarTodo();
            inicializarApp();
        }
    }

    function renderizarTabla() {
        const cuerpo = document.getElementById('tablaCuerpo');
        cuerpo.innerHTML = '';

        if (asignaturas.length === 0) {
            cuerpo.innerHTML = `<tr><td colspan="9" style="color: #a0aec0; padding: 25px;">Por favor, cree una nueva asignatura arriba para empezar a registrar notas.</td></tr>`;
            return;
        }

        if(alumnos.length === 0) {
            cuerpo.innerHTML = `<tr><td colspan="9" style="color: #a0aec0; padding: 25px;">No hay alumnos ingresados. Registre estudiantes usando el casillero de arriba.</td></tr>`;
            return;
        }

        alumnos.forEach((alumno, indexAlumno) => {
            if (!alumno.notas) alumno.notas = {};
            if (!alumno.notas[asignaturaActiva]) {
                alumno.notas[asignaturaActiva] = [0, 0, 0, 0, 0, 0];
            }

            const contextNotas = alumno.notas[asignaturaActiva];
            const notasValidas = contextNotas.filter(n => n > 0);
            const suma = notasValidas.reduce((a, b) => a + b, 0);
            const promedio = notasValidas.length > 0 ? (suma / notasValidas.length).toFixed(1) : '-.-';
            
            let clasePromedio = '';
            if (promedio !== '-.-') {
                clasePromedio = parseFloat(promedio) >= 4.0 ? 'aprobado' : 'reprobado';
            }

            const fila = document.createElement('tr');
            let celdas = '';
            for (let i = 0; i < 6; i++) {
                const val = contextNotas[i] > 0 ? contextNotas[i] : '';
                celdas += `<td><input type="number" step="0.1" min="1" max="7" class="input-nota" value="${val}" placeholder="-" onchange="actualizarNota(${indexAlumno}, ${i}, this.value)"></td>`;
            }

            fila.innerHTML = `
                <td class="student-name"><i class="fa-solid fa-user" style="color: #cbd5e0; margin-right: 8px;"></i> ${alumno.nombre}</td>
                ${celdas}
                <td class="promedio ${clasePromedio}">${promedio}</td>
                <td><button class="btn-danger btn-icon-only" onclick="eliminarAlumno(${indexAlumno})"><i class="fa-solid fa-trash"></i></button></td>
            `;
            cuerpo.appendChild(fila);
        });
    }

    function agregarAlumno() {
        const input = document.getElementById('nombreAlumno');
        const nombre = input.value.trim();
        if (!nombre) return;

        if (asignaturas.length === 0) {
            alert("Debe crear al menos una asignatura antes de registrar estudiantes.");
            return;
        }

        const nuevo = { nombre: nombre, notas: {} };
        asignaturas.forEach(as => nuevo.notas[as] = [0, 0, 0, 0, 0, 0]);

        alumnos.push(nuevo);
        input.value = '';
        guardarTodo();
        renderizarTabla();
    }

    function actualizarNota(alIndex, noIndex, val) {
        // Permitir comas cambiándolas por puntos
        let formateado = val.replace(',', '.');
        const nota = parseFloat(formateado);
        
        if (!isNaN(nota) && (nota < 1 || nota > 7)) {
            alert("Rango de notas permitido: 1.0 a 7.0");
            renderizarTabla();
            return;
        }
        alumnos[alIndex].notas[asignaturaActiva][noIndex] = isNaN(nota) ? 0 : nota;
        guardarTodo();
        renderizarTabla();
    }

    function eliminarAlumno(index) {
        if (confirm(`¿Desea eliminar a ${alumnos[index].nombre} del registro?`)) {
            alumnos.splice(index, 1);
            guardarTodo();
            renderizarTabla();
        }
    }

    inicializarApp();
</script>

</body>
</html>
